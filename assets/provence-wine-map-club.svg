      .title { fill: #1f1b19; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 62px; letter-spacing: 0.02em; }
      .legend-t { fill: #4b433d; font-family: 'DM Sans', Arial, sans-serif; font-size: 18px; letter-spacing: 0.09em; text-transform: uppercase; }
