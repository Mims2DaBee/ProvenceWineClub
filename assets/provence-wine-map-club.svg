      .river { fill: none; stroke: #b8cddd; stroke-width: 3; opacity: 0.9; }
      .label { fill: #302b28; font-family: 'DM Sans', Arial, sans-serif; font-size: 22px; letter-spacing: 0.08em; text-transform: uppercase; }
